name: CI
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { persist-credentials: false }
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_ENV: preview
      - run: npx playwright install --with-deps chromium
        if: hashFiles('playwright.config.ts') != ''
      - name: Derive per-run e2e test phone
        if: hashFiles('playwright.config.ts') != ''
        run: |
          # 55-block: disjoint from the canonical seed's 50XXXXXXX phones (spec §7).
          # Digit 8 folds in the retry attempt; digit 9 (=9) is the login journey's slot;
          # funnel journeys replace that final digit (see e2e/funnel-helpers.ts).
          echo "E2E_TEST_PHONE=55$(printf '%05d' $(( ${{ github.run_number }} % 100000 )))$(( ${{ github.run_attempt }} % 10 ))9" >> "$GITHUB_ENV"
      # e2e asserts exact facts about the CANONICAL STAGING SEED (12 approved delegates,
      # leaderboard order, pending names absent). CI never seeds. If these fail with
      # count/name mismatches, staging drifted — restore with:
      # npm run seed:staging -- --confirm-ref orcxtbedkexoclbfgvzd
      # (see scripts/seed-staging.mjs; destructive, staging-only).
      - run: npm run e2e
        if: hashFiles('playwright.config.ts') != ''
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_ENV: preview
          CI: "true"
